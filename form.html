<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulario - Nota 1</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .container { max-width:600px; margin:40px auto; padding:16px; }
      .form-group { margin-bottom:12px; }
      .form-group label { display:block; margin-bottom:6px; }
      .form-group input { width:100%; padding:8px; box-sizing:border-box; }
      .form-actions { text-align:right; margin-top:16px }
      .error { color:crimson; font-size:0.9em; display:block; height:1.1em }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Registro - Formulario</h1>
      <form id="registroForm" novalidate>
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required />
          <small class="error" data-for="nombre"></small>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
          <small class="error" data-for="email"></small>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" placeholder="+34123456789" required />
          <small class="error" data-for="telefono"></small>
        </div>

        <div class="form-group">
          <label for="edad">Edad</label>
          <input type="number" id="edad" name="edad" placeholder="30" required />
          <small class="error" data-for="edad"></small>
        </div>

        <div class="form-actions">
          <button type="submit">Enviar</button>
        </div>
      </form>
    </main>

    <script src="form.js"></script>
  </body>
</html>
